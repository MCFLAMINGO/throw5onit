<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THROW — Sponsor Dashboard</title>
  <meta name="coinzilla" content="83ee5bbfa0f3687d9c1df6d7e6209b51" />
  <link rel="icon" href="icon-192.png" />
  <script src="mqtt.min.js"></script>
  <style>
    :root {
      --bg:      #0A0A0F;
      --surface: #111118;
      --card:    #16161F;
      --border:  #252530;
      --accent:  #7C3AED;
      --accent2: #A78BFA;
      --green:   #22C55E;
      --red:     #EF4444;
      --yellow:  #F59E0B;
      --text:    #F1F5F9;
      --text2:   #94A3B8;
      --text3:   #4B5563;
      --r:       10px;
      --font:    'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

    /* NAV */
    .nav {
      height: 52px; display: flex; align-items: center;
      justify-content: space-between; padding: 0 24px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .nav-logo { font-size: 15px; font-weight: 700; color: var(--text); text-decoration: none; }
    .nav-logo span { color: var(--accent2); }
    .mqtt-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text3); transition: background .3s;
    }
    .mqtt-dot.connected  { background: var(--green); }
    .mqtt-dot.error      { background: var(--red); }

    /* PAGE */
    .page { max-width: 860px; margin: 0 auto; padding: 32px 24px; }

    /* LIVE PREVIEW */
    .live-preview {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 20px; margin-bottom: 24px;
    }
    .preview-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .preview-title { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; }
    .live-badge {
      font-size: 11px; font-weight: 700; color: var(--green);
      background: #14532D; padding: 2px 8px; border-radius: 20px;
      display: flex; align-items: center; gap: 5px;
    }
    .live-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--green); animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

    .strip-preview {
      display: flex; gap: 8px; align-items: center;
      overflow-x: auto; padding: 4px 0;
    }
    .strip-tile {
      flex-shrink: 0; width: 64px; height: 64px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 4px; overflow: hidden;
    }
    .strip-tile img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; }
    .strip-tile-name { font-size: 9px; color: var(--text2); text-align: center; overflow: hidden; white-space: nowrap; max-width: 58px; text-overflow: ellipsis; }
    .strip-tile.house { opacity: .35; }
    .strip-empty { font-size: 13px; color: var(--text3); padding: 8px 0; }

    /* SPONSORS GRID */
    .sponsors-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .sponsor-card {
      background: var(--surface); border: 2px solid var(--border);
      border-radius: var(--r); padding: 16px; cursor: pointer;
      transition: border-color .15s; position: relative;
    }
    .sponsor-card:hover { border-color: var(--accent2); }
    .sponsor-card.active { border-color: var(--green); }
    .sponsor-card.active::after {
      content: 'LIVE'; position: absolute; top: 10px; right: 10px;
      font-size: 10px; font-weight: 700; color: var(--green);
      background: #14532D; padding: 2px 6px; border-radius: 20px;
    }
    .card-logo {
      width: 52px; height: 52px; border-radius: 8px; object-fit: contain;
      background: var(--card); border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .card-logo-placeholder {
      width: 52px; height: 52px; border-radius: 8px;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 10px;
    }
    .card-name    { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
    .card-tagline { font-size: 12px; color: var(--text2); margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-url     { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-actions { display: flex; gap: 6px; margin-top: 12px; }

    /* SECTION */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title { font-size: 14px; font-weight: 600; }

    /* BUTTONS */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 14px; border-radius: 8px; font-size: 13px;
      font-weight: 600; cursor: pointer; border: none; transition: opacity .15s;
      font-family: var(--font);
    }
    .btn:hover   { opacity: .85; }
    .btn:disabled{ opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-green   { background: #166534; color: #86EFAC; border: 1px solid #166534; }
    .btn-ghost   { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .btn-danger  { background: #7F1D1D; color: #FCA5A5; border: 1px solid #991B1B; }
    .btn-sm      { padding: 5px 10px; font-size: 12px; }

    /* PUSH CONTROLS */
    .push-bar {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px 20px; margin-bottom: 24px;
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    }
    .push-bar-label { font-size: 13px; color: var(--text2); flex: 0 0 auto; }
    .push-bar-status { font-size: 12px; color: var(--text3); flex: 1; min-width: 120px; }

    /* MODAL */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.75);
      display: none; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 440px; padding: 26px;
    }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
    .field { margin-bottom: 13px; }
    .field label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; }
    .field input {
      width: 100%; background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; color: var(--text);
      font-size: 13px; outline: none; font-family: var(--font);
    }
    .field input:focus { border-color: var(--accent2); }
    .field-hint { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .logo-preview-wrap { margin-top: 8px; }
    .logo-preview {
      width: 52px; height: 52px; border-radius: 8px; object-fit: contain;
      background: var(--card); border: 1px solid var(--border); display: none;
    }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 16px; font-size: 13px;
      z-index: 999; transform: translateY(60px); opacity: 0;
      transition: all .2s; max-width: 300px;
    }
    .toast.show  { transform: translateY(0); opacity: 1; }
    .toast.ok    { border-color: var(--green); }
    .toast.err   { border-color: var(--red); }

    @media(max-width:600px){
      .sponsors-grid { grid-template-columns: 1fr; }
      .push-bar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <a class="nav-logo" href="/">THROW <span>/ Sponsors</span></a>
    <div class="mqtt-dot" id="mqtt-dot" title="MQTT status"></div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="clearAll()">Clear strips</button>
</nav>

<div class="page">

  <!-- LIVE STRIP PREVIEW -->
  <div class="live-preview">
    <div class="preview-header">
      <span class="preview-title">Live in strips right now</span>
      <span class="live-badge" id="live-badge">Connecting…</span>
    </div>
    <div class="strip-preview" id="strip-preview">
      <span class="strip-empty">No sponsors loaded yet</span>
    </div>
  </div>

  <!-- PUSH BAR -->
  <div class="push-bar">
    <span class="push-bar-label">Push to strips:</span>
    <button class="btn btn-green" id="push-btn" onclick="pushLive()" disabled>
      ▶ Push Live
    </button>
    <span class="push-bar-status" id="push-status">Select sponsors below then push</span>
  </div>

  <!-- SPONSORS -->
  <div class="section-header">
    <span class="section-title">Sponsors</span>
    <button class="btn btn-primary" onclick="openModal()">+ Add Sponsor</button>
  </div>

  <div class="sponsors-grid" id="sponsors-grid">
    <div style="color:var(--text3);font-size:13px;padding:8px 0">Loading…</div>
  </div>

</div><!-- .page -->

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <h2 id="modal-title">Add Sponsor</h2>
    <input type="hidden" id="edit-id" />

    <div class="field">
      <label>Business name</label>
      <input id="f-name" placeholder="e.g. Aqua Grill, McFlamingo" />
    </div>
    <div class="field">
      <label>Tagline</label>
      <input id="f-tagline" placeholder="e.g. Fresh seafood on the water" maxlength="60" />
    </div>
    <div class="field">
      <label>Logo URL</label>
      <input id="f-logo" placeholder="https://…" oninput="previewLogo(this.value)" />
      <div class="field-hint">Direct image URL — shown in strips and splash screen</div>
      <div class="logo-preview-wrap">
        <img class="logo-preview" id="logo-preview" alt="logo preview" />
      </div>
    </div>
    <div class="field">
      <label>Click URL <span style="color:var(--text3)">(optional)</span></label>
      <input id="f-url" placeholder="https://…" />
      <div class="field-hint">Opens when user taps the strip tile</div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="modal-save" onclick="saveSponsor()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const MQTT_BROKER  = 'wss://broker.emqx.io:8084/mqtt';
  const TOPIC        = 'throw/sponsor';
  const STORAGE_KEY  = 'throw_ad_sponsors';

  // HOUSE fallbacks shown when no paid sponsors
  const HOUSE = [
    { name: 'THROW', text: '💸' },
    { name: '$$$',   text: '$' },
    { name: 'TEMPO', text: 'T' },
  ];

  let sponsors  = [];   // all saved sponsors
  let selected  = new Set(); // ids selected to be live
  let liveState = null; // last known retained payload from broker
  let mqttClient = null;

  // ── PERSISTENCE ────────────────────────────────────────────────────────────
  function load() {
    try { sponsors = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(_) { sponsors = []; }
  }
  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(sponsors));
  }

  // ── MQTT ───────────────────────────────────────────────────────────────────
  function connectMQTT() {
    const dot = document.getElementById('mqtt-dot');
    const badge = document.getElementById('live-badge');
    try {
      mqttClient = mqtt.connect(MQTT_BROKER, {
        clientId: 'throw_ads_' + Math.random().toString(36).slice(2,8),
        clean: true, connectTimeout: 8000, reconnectPeriod: 5000,
      });

      mqttClient.on('connect', () => {
        dot.className = 'mqtt-dot connected';
        badge.textContent = 'Connected';
        // Subscribe to read current retained state
        mqttClient.subscribe(TOPIC, { qos: 1 });
      });

      mqttClient.on('message', (_t, msg) => {
        try {
          const data = JSON.parse(msg.toString());
          liveState = data;
          renderLivePreview(data);
          // Mark which cards are currently live
          const liveNames = (data.sponsors || (data.sponsor ? [data.sponsor] : [])).map(s => s.name);
          selected = new Set(sponsors.filter(s => liveNames.includes(s.name)).map(s => s.id));
          renderGrid();
          updatePushBtn();
        } catch(_) {}
      });

      mqttClient.on('error', () => { dot.className = 'mqtt-dot error'; });
      mqttClient.on('offline', () => { dot.className = 'mqtt-dot'; badge.textContent = 'Offline'; });
    } catch(e) {
      dot.className = 'mqtt-dot error';
    }
  }

  function publish(payload) {
    return new Promise((resolve, reject) => {
      if (!mqttClient?.connected) { reject(new Error('MQTT not connected')); return; }
      mqttClient.publish(TOPIC, JSON.stringify(payload), { qos: 1, retain: true }, (err) => {
        if (err) reject(err); else resolve();
      });
    });
  }

  // ── PUSH LIVE ───────────────────────────────────────────────────────────────
  async function pushLive() {
    const btn = document.getElementById('push-btn');
    const status = document.getElementById('push-status');
    const active = sponsors.filter(s => selected.has(s.id));

    if (!active.length) { toast('Select at least one sponsor', 'err'); return; }

    btn.disabled = true;
    btn.textContent = 'Pushing…';

    const payload = {
      sponsor:  active[0],     // primary (splash + orb)
      sponsors: active,        // all (strips rotation)
      pushedAt: new Date().toISOString(),
    };

    try {
      await publish(payload);
      status.textContent = `✓ ${active.map(s => s.name).join(', ')} live in strips`;
      status.style.color = 'var(--green)';
      renderLivePreview(payload);
      renderGrid();
      toast('Pushed live — strips updating now', 'ok');
    } catch(e) {
      toast('Push failed: ' + e.message, 'err');
      status.textContent = 'Push failed — check MQTT connection';
      status.style.color = 'var(--red)';
    } finally {
      btn.disabled = false;
      btn.textContent = '▶ Push Live';
    }
  }

  async function clearAll() {
    if (!confirm('Clear all sponsors from strips? House brands will show instead.')) return;
    try {
      await publish({ sponsor: null, sponsors: [], clearedAt: new Date().toISOString() });
      selected.clear();
      renderLivePreview({ sponsors: [] });
      renderGrid();
      updatePushBtn();
      toast('Strips cleared — house brands now showing', 'ok');
    } catch(e) {
      toast('Clear failed: ' + e.message, 'err');
    }
  }

  // ── RENDER ─────────────────────────────────────────────────────────────────
  function renderLivePreview(data) {
    const wrap = document.getElementById('strip-preview');
    const badge = document.getElementById('live-badge');
    const active = data?.sponsors || (data?.sponsor ? [data.sponsor] : []);

    if (!active.length) {
      wrap.innerHTML = `<span class="strip-empty">No paid sponsors — house brands showing</span>`;
      badge.textContent = 'House';
      badge.style.color = 'var(--yellow)';
      badge.style.background = '#451A03';
      return;
    }

    badge.textContent = 'Live';
    badge.style.color = 'var(--green)';
    badge.style.background = '#14532D';

    wrap.innerHTML = active.map(sp => `
      <div class="strip-tile" title="${escHtml(sp.name)}">
        ${sp.logoUrl
          ? `<img src="${escHtml(sp.logoUrl)}" alt="${escHtml(sp.name)}" onerror="this.style.display='none'" />`
          : `<span style="font-size:20px">📣</span>`}
        <div class="strip-tile-name">${escHtml(sp.name)}</div>
      </div>
    `).join('') + HOUSE.map(h => `
      <div class="strip-tile house" title="${h.name}">
        <span style="font-size:20px">${h.text}</span>
        <div class="strip-tile-name">${h.name}</div>
      </div>
    `).join('');
  }

  function renderGrid() {
    const grid = document.getElementById('sponsors-grid');
    if (!sponsors.length) {
      grid.innerHTML = `<div style="color:var(--text3);font-size:13px;padding:8px 0;grid-column:1/-1">No sponsors yet — add one above.</div>`;
      return;
    }
    grid.innerHTML = sponsors.map(sp => {
      const isActive = selected.has(sp.id);
      const logo = sp.logoUrl
        ? `<img class="card-logo" src="${escHtml(sp.logoUrl)}" alt="${escHtml(sp.name)}" onerror="this.style.display='none'" />`
        : `<div class="card-logo-placeholder">📣</div>`;
      return `
        <div class="sponsor-card ${isActive ? 'active' : ''}" onclick="toggleSelect('${sp.id}')">
          ${logo}
          <div class="card-name">${escHtml(sp.name)}</div>
          <div class="card-tagline">${escHtml(sp.tagline || '')}</div>
          <div class="card-url">${escHtml(sp.url || '')}</div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost btn-sm" onclick="openModal('${sp.id}')">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteSponsor('${sp.id}')">Remove</button>
          </div>
        </div>`;
    }).join('');
  }

  function updatePushBtn() {
    const btn = document.getElementById('push-btn');
    const status = document.getElementById('push-status');
    const n = selected.size;
    btn.disabled = n === 0;
    if (n === 0) status.textContent = 'Tap a sponsor card to select it, then push';
    else         status.textContent = `${n} sponsor${n>1?'s':''} selected — push to go live`;
    status.style.color = n ? 'var(--accent2)' : 'var(--text3)';
  }

  function toggleSelect(id) {
    if (selected.has(id)) selected.delete(id);
    else selected.add(id);
    renderGrid();
    updatePushBtn();
  }

  // ── CRUD ───────────────────────────────────────────────────────────────────
  function openModal(id) {
    const sp = id ? sponsors.find(s => s.id === id) : null;
    document.getElementById('modal-title').textContent = sp ? 'Edit Sponsor' : 'Add Sponsor';
    document.getElementById('edit-id').value   = sp?.id || '';
    document.getElementById('f-name').value    = sp?.name || '';
    document.getElementById('f-tagline').value = sp?.tagline || '';
    document.getElementById('f-logo').value    = sp?.logoUrl || '';
    document.getElementById('f-url').value     = sp?.url || '';
    previewLogo(sp?.logoUrl || '');
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  function closeOnOverlay(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

  function saveSponsor() {
    const id      = document.getElementById('edit-id').value;
    const name    = document.getElementById('f-name').value.trim();
    const tagline = document.getElementById('f-tagline').value.trim();
    const logoUrl = document.getElementById('f-logo').value.trim();
    const url     = document.getElementById('f-url').value.trim();

    if (!name) { toast('Name required', 'err'); return; }

    if (id) {
      const idx = sponsors.findIndex(s => s.id === id);
      if (idx > -1) sponsors[idx] = { ...sponsors[idx], name, tagline, logoUrl, url };
    } else {
      sponsors.push({ id: crypto.randomUUID(), name, tagline, logoUrl, url });
    }
    save();
    closeModal();
    renderGrid();
    updatePushBtn();
    toast(id ? 'Updated' : 'Sponsor added — select it and push live', 'ok');
  }

  function deleteSponsor(id) {
    const sp = sponsors.find(s => s.id === id);
    if (!confirm(`Remove ${sp?.name}?`)) return;
    sponsors = sponsors.filter(s => s.id !== id);
    selected.delete(id);
    save();
    renderGrid();
    updatePushBtn();
    toast('Removed', 'ok');
  }

  function previewLogo(url) {
    const img = document.getElementById('logo-preview');
    if (url && url.startsWith('http')) {
      img.src = url;
      img.style.display = 'block';
      img.onerror = () => { img.style.display = 'none'; };
    } else {
      img.style.display = 'none';
    }
  }

  // ── UTILS ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = 'toast'; }, 3000);
  }

  function escHtml(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── INIT ───────────────────────────────────────────────────────────────────
  load();
  renderGrid();
  updatePushBtn();
  connectMQTT();
</script>
</body>
</html>
